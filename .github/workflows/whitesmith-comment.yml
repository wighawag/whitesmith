# NOTE: This file is generated in .generated-workflows/ because GitHub App tokens
# cannot push to .github/workflows/. Move it manually to .github/workflows/ to activate.
#
# This workflow requires the repo setting:
#   Settings → Actions → General → "Allow GitHub Actions to create and approve pull requests"
name: whitesmith-comment

on:
  issue_comment:
    types: [created]

concurrency:
  group: whitesmith-comment-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check if should run
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          # Always run if comment contains /whitesmith
          if echo "$COMMENT_BODY" | grep -q '/whitesmith'; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Triggered by /whitesmith keyword"
            exit 0
          fi

          # For PR comments, auto-trigger if the PR is on a whitesmith branch
          if [ -n "${{ github.event.issue.pull_request.url }}" ]; then
            BRANCH=$(gh pr view ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --json headRefName -q .headRefName)
            echo "PR branch: $BRANCH"
            if echo "$BRANCH" | grep -qE '^(investigate|task)/'; then
              echo "should_run=true" >> "$GITHUB_OUTPUT"
              echo "Triggered by comment on whitesmith PR branch"
              exit 0
            fi
          fi

          echo "should_run=false" >> "$GITHUB_OUTPUT"
          echo "Skipping: not a /whitesmith command and not a whitesmith PR"

  run:
    needs: check
    runs-on: ubuntu-latest
    if: needs.check.outputs.should_run == 'true'
    steps:
      - name: React with eyes to acknowledge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content=eyes

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configure git
        run: |
          git config user.name "whitesmith[bot]"
          git config user.email "whitesmith[bot]@users.noreply.github.com"

      - name: Get npm global prefix
        id: npm-prefix
        run: echo "dir=$(npm prefix -g)" >> "$GITHUB_OUTPUT"

      - name: Cache global npm packages
        id: npm-cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.npm-prefix.outputs.dir }}
          key: npm-global-${{ runner.os }}-${{ github.repository == 'wighawag/whitesmith' && 'source' || 'registry' }}-pi-v2

      - name: Setup pnpm
        if: github.repository == 'wighawag/whitesmith'
        uses: pnpm/action-setup@v4

      - name: Install or build whitesmith
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: |
          if [ "${{ github.repository }}" = "wighawag/whitesmith" ]; then
            echo "Running in whitesmith repo — building from source"
            pnpm install
            pnpm run build
            pnpm link --global
          else
            npm install -g whitesmith
          fi

      - name: Rebuild whitesmith from source (cache hit)
        if: steps.npm-cache.outputs.cache-hit == 'true' && github.repository == 'wighawag/whitesmith'
        run: |
          pnpm install
          pnpm run build
          pnpm link --global

      - name: Install pi
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm install -g @mariozechner/pi-coding-agent

      # Workaround for https://github.com/badlogic/pi-mono/issues/2743
      # Anthropic's OAuth token endpoint now requires application/x-www-form-urlencoded
      # but pi-ai sends application/json, causing HTTP 400 on token refresh.
      - name: Patch pi OAuth token refresh
        run: |
          PI_GLOBAL=$(npm prefix -g)
          echo "npm global prefix: $PI_GLOBAL"
          PI_AI_OAUTH=$(find "$PI_GLOBAL" -path '*/pi-ai/dist/utils/oauth/anthropic.js' 2>/dev/null | head -1)
          if [ -z "$PI_AI_OAUTH" ]; then
            echo "ERROR: Could not find pi-ai anthropic.js to patch"
            echo "Contents of npm global prefix:"
            find "$PI_GLOBAL" -name 'anthropic.js' 2>/dev/null || echo "(no anthropic.js found)"
            exit 1
          fi
          echo "Patching $PI_AI_OAUTH"
          # Only patch if not already patched (idempotent)
          if grep -q 'async function postJson' "$PI_AI_OAUTH"; then
            sed -i 's/async function postJson(url, body) {/async function postForm(url, body) {/' "$PI_AI_OAUTH"
            sed -i 's/"Content-Type": "application\/json",/"Content-Type": "application\/x-www-form-urlencoded",/' "$PI_AI_OAUTH"
            sed -i 's/body: JSON.stringify(body),/body: new URLSearchParams(body).toString(),/' "$PI_AI_OAUTH"
            sed -i 's/await postJson(TOKEN_URL,/await postForm(TOKEN_URL,/g' "$PI_AI_OAUTH"
            echo "Patch applied successfully"
          else
            echo "Already patched, skipping"
          fi
          grep -n 'postForm\|x-www-form-urlencoded\|URLSearchParams' "$PI_AI_OAUTH"

      - name: Configure pi auth
        env:
          PI_AUTH_JSON: ${{ secrets.PI_AUTH_JSON }}
        run: |
          if [ -z "$PI_AUTH_JSON" ]; then
            echo "ERROR: PI_AUTH_JSON secret is not configured."
            echo "Set it to the contents of ~/.pi/agent/auth.json"
            exit 1
          fi
          mkdir -p ~/.pi/agent
          echo "$PI_AUTH_JSON" > ~/.pi/agent/auth.json
          chmod 600 ~/.pi/agent/auth.json
          echo "Configured pi auth from PI_AUTH_JSON"

      - name: Save comment body to file
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          printf '%s' "$COMMENT_BODY" > .whitesmith-comment-body.txt

      - name: Run whitesmith comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PROVIDER="${{ vars.WHITESMITH_PROVIDER }}"
          MODEL="${{ vars.WHITESMITH_MODEL }}"
          if [ -z "$PROVIDER" ] || [ -z "$MODEL" ]; then
            echo "ERROR: WHITESMITH_PROVIDER and WHITESMITH_MODEL repository variables are required."
            exit 1
          fi
          whitesmith comment . \
            --number "${{ github.event.issue.number }}" \
            --body-file .whitesmith-comment-body.txt \
            --provider "$PROVIDER" \
            --model "$MODEL" \
            --post

      - name: React with checkmark on success
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content="+1"

      - name: React with X and comment on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content="-1"
          gh issue comment ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body "❌ Agent run failed for [this comment](${{ github.event.comment.html_url }}). Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
