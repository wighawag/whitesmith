# NOTE: This workflow requires the repo setting:
#   Settings → Actions → General → "Allow GitHub Actions to create and approve pull requests"
# Without this, PR creation will fail with a permissions error.
name: whitesmith

on:
  schedule:
    # Run every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      max_iterations:
        description: 'Maximum iterations'
        default: '3'
        type: string
      provider:
        description: 'AI provider (e.g. anthropic, openai)'
        required: true
        type: string
      model:
        description: 'AI model ID (e.g. claude-opus-4-6)'
        required: true
        type: string

concurrency:
  group: whitesmith-loop
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configure git
        run: |
          git config user.name "whitesmith[bot]"
          git config user.email "whitesmith[bot]@users.noreply.github.com"

      - name: Get npm global prefix
        id: npm-prefix
        run: echo "dir=$(npm prefix -g)" >> "$GITHUB_OUTPUT"

      - name: Cache global npm packages
        id: npm-cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.npm-prefix.outputs.dir }}
          key: npm-global-${{ runner.os }}-${{ github.repository == 'wighawag/whitesmith' && 'source' || 'registry' }}-pi-v2

      - name: Setup pnpm
        if: github.repository == 'wighawag/whitesmith'
        uses: pnpm/action-setup@v4

      - name: Install or build whitesmith
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: |
          if [ "${{ github.repository }}" = "wighawag/whitesmith" ]; then
            echo "Running in whitesmith repo — building from source"
            pnpm install
            pnpm run build
            pnpm link --global
          else
            npm install -g whitesmith
          fi

      - name: Rebuild whitesmith from source (cache hit)
        if: steps.npm-cache.outputs.cache-hit == 'true' && github.repository == 'wighawag/whitesmith'
        run: |
          pnpm install
          pnpm run build
          pnpm link --global

      - name: Install pi
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm install -g @mariozechner/pi-coding-agent

      # Workaround for https://github.com/badlogic/pi-mono/issues/2743
      # Anthropic's OAuth token endpoint now requires application/x-www-form-urlencoded
      # but pi-ai sends application/json, causing HTTP 400 on token refresh.
      - name: Patch pi OAuth token refresh
        run: |
          PI_GLOBAL=$(npm prefix -g)
          echo "npm global prefix: $PI_GLOBAL"
          PI_AI_OAUTH=$(find "$PI_GLOBAL" -path '*/pi-ai/dist/utils/oauth/anthropic.js' 2>/dev/null | head -1)
          if [ -z "$PI_AI_OAUTH" ]; then
            echo "ERROR: Could not find pi-ai anthropic.js to patch"
            echo "Contents of npm global prefix:"
            find "$PI_GLOBAL" -name 'anthropic.js' 2>/dev/null || echo "(no anthropic.js found)"
            exit 1
          fi
          echo "Patching $PI_AI_OAUTH"
          # Only patch if not already patched (idempotent)
          if grep -q 'async function postJson' "$PI_AI_OAUTH"; then
            sed -i 's/async function postJson(url, body) {/async function postForm(url, body) {/' "$PI_AI_OAUTH"
            sed -i 's/"Content-Type": "application\/json",/"Content-Type": "application\/x-www-form-urlencoded",/' "$PI_AI_OAUTH"
            sed -i 's/body: JSON.stringify(body),/body: new URLSearchParams(body).toString(),/' "$PI_AI_OAUTH"
            sed -i 's/await postJson(TOKEN_URL,/await postForm(TOKEN_URL,/g' "$PI_AI_OAUTH"
            echo "Patch applied successfully"
          else
            echo "Already patched, skipping"
          fi
          grep -n 'postForm\|x-www-form-urlencoded\|URLSearchParams' "$PI_AI_OAUTH"

      - name: Configure pi auth
        env:
          PI_AUTH_JSON: ${{ secrets.PI_AUTH_JSON }}
        run: |
          if [ -z "$PI_AUTH_JSON" ]; then
            echo "ERROR: PI_AUTH_JSON secret is not configured."
            echo "Set it to the contents of ~/.pi/agent/auth.json"
            echo ""
            echo "API key example:"
            echo '  {"anthropic": {"type": "api_key", "key": "sk-ant-..."}}'
            echo ""
            echo "OAuth/subscription example:"
            echo '  {"anthropic": {"type": "oauth", "refresh": "sk-ant-ort01-...", "access": "sk-ant-oat01-...", "expires": 1234567890}}'
            exit 1
          fi
          mkdir -p ~/.pi/agent
          echo "$PI_AUTH_JSON" > ~/.pi/agent/auth.json
          chmod 600 ~/.pi/agent/auth.json
          echo "Configured pi auth from PI_AUTH_JSON"
          echo "Auth file exists: $(test -f ~/.pi/agent/auth.json && echo yes || echo no)"
          echo "Auth file size: $(wc -c < ~/.pi/agent/auth.json) bytes"
          echo "Auth providers: $(cat ~/.pi/agent/auth.json | node -e "process.stdin.on('data',d=>{try{console.log(Object.keys(JSON.parse(d)).join(','))}catch(e){console.log('PARSE ERROR:',e.message)}})")"

      - name: Verify pi auth
        run: |
          echo "HOME=$HOME"
          echo "Auth file: $(ls -la ~/.pi/agent/auth.json 2>&1)"
          echo "Lock files: $(ls -la ~/.pi/agent/auth.json.lock 2>&1 || echo none)"
          echo "Testing pi directly..."
          pi --print --no-tools --no-session --provider "${{ inputs.provider || vars.WHITESMITH_PROVIDER }}" --model "${{ inputs.model || vars.WHITESMITH_MODEL }}" "say OK" || {
            echo "pi direct test failed, checking with PI_CODING_AGENT_DIR..."
            PI_CODING_AGENT_DIR="$HOME/.pi/agent" pi --print --no-tools --no-session --provider "${{ inputs.provider || vars.WHITESMITH_PROVIDER }}" --model "${{ inputs.model || vars.WHITESMITH_MODEL }}" "say OK"
          }

      - name: Run whitesmith
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PROVIDER="${{ inputs.provider || vars.WHITESMITH_PROVIDER }}"
          MODEL="${{ inputs.model || vars.WHITESMITH_MODEL }}"
          if [ -z "$PROVIDER" ] || [ -z "$MODEL" ]; then
            echo "ERROR: --provider and --model are required."
            echo "For scheduled runs, set WHITESMITH_PROVIDER and WHITESMITH_MODEL repository variables."
            exit 1
          fi
          whitesmith run . \
            --agent-cmd "pi" \
            --provider "$PROVIDER" \
            --model "$MODEL" \
            --max-iterations ${{ inputs.max_iterations || '3' }}
